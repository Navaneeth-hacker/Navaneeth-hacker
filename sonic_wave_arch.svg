<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="300">
  <defs>
    <!-- Dark glassmorphic card fill -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e1320" />
      <stop offset="100%" stop-color="#060912" />
    </linearGradient>
    
    <!-- Accent gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdae" />
      <stop offset="100%" stop-color="#70a5fd" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bf91f3" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(56,189,174,0.3)); }
      50% { filter: drop-shadow(0 0 8px rgba(56,189,174,0.7)); }
    }
    @keyframes dashSignal {
      to { stroke-dashoffset: -24; }
    }
    @keyframes batteryIndicator {
      0%, 100% { fill-opacity: 0.3; }
      50% { fill-opacity: 0.8; }
    }

    .node-rect {
      fill: url(#cardBg);
      stroke: #1f2a45;
      stroke-width: 1.5;
      rx: 6px;
    }
    .node-header {
      font-family: 'Fira Code', 'Roboto Mono', monospace;
      font-size: 11px;
      font-weight: bold;
      fill: #ffffff;
    }
    .node-body {
      font-family: 'Fira Code', monospace;
      font-size: 9px;
      fill: #a0aec0;
    }
    .flow-path {
      fill: none;
      stroke: #70a5fd;
      stroke-width: 1.5;
      stroke-opacity: 0.4;
    }
    .flow-signal {
      fill: none;
      stroke: #38bdae;
      stroke-width: 2;
      stroke-dasharray: 6, 18;
      animation: dashSignal 1.2s infinite linear;
      filter: url(#glowCyan);
    }
    .flow-signal-alt {
      fill: none;
      stroke: #bf91f3;
      stroke-width: 2;
      stroke-dasharray: 6, 18;
      animation: dashSignal 1.6s infinite linear;
    }
    .bat-cell {
      fill: #38bdae;
      animation: batteryIndicator 2s infinite ease-in-out;
    }
  </style>

  <!-- Background Canvas -->
  <rect width="850" height="300" fill="#070a13" rx="10" stroke="#1c2438" stroke-width="1" />
  
  <text x="25" y="30" font-family="'Fira Code', monospace" font-size="12" fill="#70a5fd" font-weight="bold" opacity="0.8">SONIC WAVE // DUAL-BATTERY ABSS ARCHITECTURE</text>
  <text x="825" y="30" font-family="'Fira Code', monospace" font-size="10" fill="#38bdae" font-weight="bold" text-anchor="end" opacity="0.8">SYSTEM STATUS: OPTIMAL</text>

  <!-- ==================== FLOW LINES ==================== -->
  <!-- Battery A to ABSS -->
  <path d="M 180,80 L 220,80 L 220,130 L 260,130" class="flow-path" />
  <path d="M 180,80 L 220,80 L 220,130 L 260,130" class="flow-signal" />

  <!-- Battery B to ABSS -->
  <path d="M 180,220 L 220,220 L 220,170 L 260,170" class="flow-path" />
  <path d="M 180,220 L 220,220 L 220,170 L 260,170" class="flow-signal" style="animation-delay: -0.6s;" />

  <!-- ABSS to Sensor Network (Feedback loop) -->
  <path d="M 340,195 L 340,215" class="flow-path" />
  <path d="M 340,215 L 340,195" class="flow-signal-alt" />

  <!-- ABSS to Decision Engine -->
  <path d="M 420,150 L 500,150" class="flow-path" />
  <path d="M 420,150 L 500,150" class="flow-signal" />

  <!-- Decision Engine to Vehicle Load -->
  <path d="M 660,150 L 720,150" class="flow-path" />
  <path d="M 660,150 L 720,150" class="flow-signal" style="animation-duration: 0.8s;" />


  <!-- ==================== COMPONENTS ==================== -->

  <!-- Component 1: Battery A (Active) -->
  <g transform="translate(40, 50)" style="animation: pulseGlow 4s infinite ease-in-out;">
    <rect width="140" height="60" class="node-rect" stroke="#38bdae" />
    <path d="M 0,0 L 140,0" stroke="url(#cyanGrad)" stroke-width="2" />
    <text x="12" y="20" class="node-header" fill="#38bdae">BATTERY A [SYS_1]</text>
    <text x="12" y="35" class="node-body">V: 78.4V  |  SOC: 94.2%</text>
    <text x="12" y="48" class="node-body">Status: Active Supply</text>
    <!-- Mini battery graphic -->
    <rect x="110" y="8" width="15" height="8" rx="1" fill="none" stroke="#38bdae" stroke-width="1" />
    <rect x="111" y="9" width="10" height="6" class="bat-cell" />
    <rect x="125" y="10" width="2" height="4" fill="#38bdae" />
  </g>

  <!-- Component 2: Battery B (Standby) -->
  <g transform="translate(40, 190)">
    <rect width="140" height="60" class="node-rect" stroke="#1f2a45" />
    <path d="M 0,0 L 140,0" stroke="#70a5fd" stroke-width="1.5" />
    <text x="12" y="20" class="node-header" fill="#70a5fd">BATTERY B [SYS_2]</text>
    <text x="12" y="35" class="node-body">V: 78.1V  |  SOC: 92.8%</text>
    <text x="12" y="48" class="node-body">Status: Standby Mode</text>
    <!-- Mini battery graphic -->
    <rect x="110" y="8" width="15" height="8" rx="1" fill="none" stroke="#70a5fd" stroke-width="1" />
    <rect x="111" y="9" width="13" height="6" fill="#70a5fd" />
    <rect x="125" y="10" width="2" height="4" fill="#70a5fd" />
  </g>

  <!-- Component 3: ABSS Controller -->
  <g transform="translate(260, 110)">
    <rect width="160" height="85" class="node-rect" stroke="#38bdae" />
    <path d="M 0,0 L 160,0" stroke="url(#cyanGrad)" stroke-width="2" />
    <text x="12" y="20" class="node-header" fill="#38bdae">ABSS CONTROLLER</text>
    <text x="12" y="38" class="node-body">» Automated Selection</text>
    <text x="12" y="51" class="node-body">» Seamless Switching</text>
    <text x="12" y="64" class="node-body">» Micro-Switching: &lt;10ms</text>
    <text x="12" y="77" class="node-body">» ESP32 Driven Firmware</text>
  </g>

  <!-- Component 4: Sensor Network (Telemetry Feedback) -->
  <g transform="translate(260, 215)">
    <rect width="160" height="45" class="node-rect" stroke="#bf91f3" />
    <text x="12" y="15" class="node-header" fill="#bf91f3">SENSOR MATRIX [I2C]</text>
    <text x="12" y="28" class="node-body">Voltage / Current / Temp</text>
    <text x="12" y="38" class="node-body">Telemetry Rate: 100 Hz</text>
  </g>

  <!-- Component 5: AI & Decision Engine -->
  <g transform="translate(500, 110)" style="animation: pulseGlow 5s infinite ease-in-out;">
    <rect width="160" height="85" class="node-rect" stroke="#bf91f3" />
    <path d="M 0,0 L 160,0" stroke="url(#purpleGrad)" stroke-width="2" />
    <text x="12" y="20" class="node-header" fill="#bf91f3">DECISION ENGINE</text>
    <text x="12" y="38" class="node-body">» SOC/SOH Predictions</text>
    <text x="12" y="51" class="node-body">» Temp Anomaly Detection</text>
    <text x="12" y="64" class="node-body">» Predictive Maintenance</text>
    <text x="12" y="77" class="node-body">» Dual Routing Optimizer</text>
  </g>

  <!-- Component 6: Vehicle Load -->
  <g transform="translate(710, 120)">
    <rect width="105" height="60" class="node-rect" stroke="#70a5fd" />
    <path d="M 0,0 L 105,0" stroke="#70a5fd" stroke-width="1.5" />
    <text x="12" y="20" class="node-header" fill="#70a5fd">VEHICLE LOAD</text>
    <text x="12" y="35" class="node-body">Draw: 1.0 kW</text>
    <text x="12" y="48" class="node-body">Current: 12.8 A</text>
  </g>

</svg>
