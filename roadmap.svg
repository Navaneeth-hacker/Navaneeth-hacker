<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 220" width="100%" height="220">
  <defs>
    <!-- Background Card -->
    <linearGradient id="roadmapBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#060912" />
      <stop offset="100%" stop-color="#03050a" />
    </linearGradient>

    <!-- Glowing effect -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdae" />
      <stop offset="30%" stop-color="#70a5fd" />
      <stop offset="70%" stop-color="#bf91f3" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>

  <style>
    @keyframes linePulse {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: -40; }
    }
    @keyframes nodePulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(112, 165, 253, 0.4)); }
      50% { transform: scale(1.2); filter: drop-shadow(0 0 8px rgba(112, 165, 253, 0.8)); }
    }
    .main-line {
      fill: none;
      stroke: url(#lineGrad);
      stroke-width: 3;
      stroke-dasharray: 400;
      animation: linePulse 20s infinite linear;
    }
    .node-center {
      transform-origin: center;
      animation: nodePulse 3s infinite ease-in-out;
    }
    .milestone-title {
      font-family: 'Fira Code', 'Roboto Mono', monospace;
      font-size: 11px;
      font-weight: bold;
      fill: #ffffff;
    }
    .milestone-year {
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      font-weight: bold;
    }
    .milestone-body {
      font-family: 'Fira Code', monospace;
      font-size: 8px;
      fill: #a0aec0;
    }
    .connector {
      stroke-dasharray: 3, 3;
      opacity: 0.5;
    }
  </style>

  <!-- Canvas Container -->
  <rect width="850" height="220" fill="url(#roadmapBg)" rx="10" stroke="#1c2438" stroke-width="1" />

  <!-- Title -->
  <text x="25" y="30" font-family="'Fira Code', monospace" font-size="12" fill="#70a5fd" font-weight="bold" opacity="0.8">INNOVATION &amp; RESEARCH ROADMAP // 2026 - 2029+</text>
  
  <!-- ==================== TIMELINE TRACK ==================== -->
  <line x1="80" y1="110" x2="770" y2="110" class="main-line" />

  <!-- ==================== 2026 MILESTONE (Bottom) ==================== -->
  <g transform="translate(100, 110)">
    <!-- Node -->
    <circle cx="0" cy="0" r="7" fill="#38bdae" class="node-center" filter="url(#glowCyan)" />
    <!-- Connector -->
    <line x1="0" y1="0" x2="0" y2="35" stroke="#38bdae" class="connector" />
    
    <!-- Info block -->
    <g transform="translate(-80, 40)">
      <rect width="160" height="55" fill="#0c1220" stroke="#38bdae" stroke-width="1" rx="4" />
      <text x="10" y="15" class="milestone-year" fill="#38bdae">2026</text>
      <text x="10" y="28" class="milestone-body">» Malware RE &amp; Analysis</text>
      <text x="10" y="38" class="milestone-body">» Active Directory Audits</text>
      <text x="10" y="48" class="milestone-body">» Linux Privilege Escalation</text>
    </g>
  </g>

  <!-- ==================== 2027 MILESTONE (Top) ==================== -->
  <g transform="translate(290, 110)">
    <!-- Node -->
    <circle cx="0" cy="0" r="7" fill="#70a5fd" class="node-center" style="animation-delay: 0.7s;" />
    <!-- Connector -->
    <line x1="0" y1="0" x2="0" y2="-35" stroke="#70a5fd" class="connector" />
    
    <!-- Info block -->
    <g transform="translate(-80, -95)">
      <rect width="160" height="55" fill="#0c1220" stroke="#70a5fd" stroke-width="1" rx="4" />
      <text x="10" y="15" class="milestone-year" fill="#70a5fd">2027</text>
      <text x="10" y="28" class="milestone-body">» Embedded Systems Sec</text>
      <text x="10" y="38" class="milestone-body">» Hardware Security Lab</text>
      <text x="10" y="48" class="milestone-body">» Custom Pentest Tools</text>
    </g>
  </g>

  <!-- ==================== 2028 MILESTONE (Bottom) ==================== -->
  <g transform="translate(480, 110)">
    <!-- Node -->
    <circle cx="0" cy="0" r="7" fill="#bf91f3" class="node-center" filter="url(#glowPurple)" style="animation-delay: 1.4s;" />
    <!-- Connector -->
    <line x1="0" y1="0" x2="0" y2="35" stroke="#bf91f3" class="connector" />
    
    <!-- Info block -->
    <g transform="translate(-80, 40)">
      <rect width="160" height="55" fill="#0c1220" stroke="#bf91f3" stroke-width="1" rx="4" />
      <text x="10" y="15" class="milestone-year" fill="#bf91f3">2028</text>
      <text x="10" y="28" class="milestone-body">» AI Threats &amp; Defense</text>
      <text x="10" y="38" class="milestone-body">» Advanced EV Energy Tech</text>
      <text x="10" y="48" class="milestone-body">» Threat Intel Automation</text>
    </g>
  </g>

  <!-- ==================== 2029+ MILESTONE (Top) ==================== -->
  <g transform="translate(670, 110)">
    <!-- Node -->
    <circle cx="0" cy="0" r="7" fill="#4f46e5" class="node-center" style="animation-delay: 2.1s;" />
    <!-- Connector -->
    <line x1="0" y1="0" x2="0" y2="-35" stroke="#4f46e5" class="connector" />
    
    <!-- Info block -->
    <g transform="translate(-80, -95)">
      <rect width="160" height="55" fill="#0c1220" stroke="#4f46e5" stroke-width="1" rx="4" />
      <text x="10" y="15" class="milestone-year" fill="#4f46e5">2029+</text>
      <text x="10" y="28" class="milestone-body">» Sonic Wave Rollout</text>
      <text x="10" y="38" class="milestone-body">» Hacktura Deep Tech Scale</text>
      <text x="10" y="48" class="milestone-body">» Enterprise EV Fleet Sync</text>
    </g>
  </g>

</svg>
